theme = "inconfidente"

[editor]
auto-format = true
auto-pairs = true
bufferline = "multiple"
cursorline = true
line-number = "relative"
mouse = true
rulers = [ 80 ]
scroll-lines = 1
shell = [ "fish", "-c" ]
true-color = true
undercurl = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = true

[editor.indent-guides]
render = true

[editor.lsp]
display-messages = true

[editor.soft-wrap]
wrap-at-text-width = true
wrap-indicator = ""

[editor.statusline]
mode.normal = "∀"
mode.insert = "↪"
mode.select = "↠"
separator = "⋮"

[keys.normal]
esc = [ "collapse_selection", "keep_primary_selection" ]
C-p = [ "move_line_up", "scroll_up" ]
C-n = [ "move_line_down", "scroll_down" ]

[keys.normal.space]
w = ":write"
q = ":quit"
