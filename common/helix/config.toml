theme = "inconfidente"

[editor]
auto-format = true
auto-info = true
auto-pairs = true
bufferline = "multiple"
cursorline = true
line-number = "relative"
mouse = true
rulers = [ 80 ]
scroll-lines = 1
shell = [ "fish", "-c" ]
true-color = true
undercurl = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = true

[editor.indent-guides]
render = true
skip-levels = 0

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.soft-wrap]
enable = true
wrap-at-text-width = true
wrap-indicator = ""

[editor.statusline]
mode.normal = "∀"
mode.insert = "↪"
mode.select = "↠"
separator = "⋮"
left = [ "mode", "spinner", "file-name", "file-type", "total-line-numbers", "file-encoding" ]
center = []
right = [ "selections", "primary-selection-length", "position", "position-percentage", "spacer", "diagnostics", "workspace-diagnostics", "version-control" ]

[keys.normal]
esc = [ "collapse_selection", "keep_primary_selection" ]
C-p = [ "move_line_up", "scroll_up" ]
C-n = [ "move_line_down", "scroll_down" ]

[keys.normal.space]
w = ":write"
q = ":quit"
x = ":buffer-close"
"." = "file_picker_in_current_buffer_directory"
n = "signature_help"

[keys.select.space]
"|" = ":pipe-to"
